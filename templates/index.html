<!DOCTYPE html>
<html>
<head>
    <title>Blockchain Voting System</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #f0f0f0; }
        h1 { color: #2c3e50; }
        button { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 8px; }
        button:hover { background: #2980b9; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗳️ Blockchain Voting System</h1>
        <p>Your voting system is deployed on Render!</p>
        <div id="candidates"></div>
        <p id="status" style="color: green; margin-top: 20px;">✅ System running</p>
    </div>
    
    <script>
        fetch('/api/candidates')
            .then(res => res.json())
            .then(data => {
                const div = document.getElementById('candidates');
                data.candidates.forEach((c, i) => {
                    div.innerHTML += `<button onclick="alert('Voted for ${c}')">Vote for ${c}</button><br>`;
                });
            });
    </script>
</body>
</html>
